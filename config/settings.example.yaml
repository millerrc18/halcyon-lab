app:
  environment: local
  timezone: America/New_York

# ── Email / SMTP configuration ──────────────────────────────────────
# Fill these in inside config/settings.local.yaml (never commit that file).
# For Gmail: use smtp.gmail.com / port 587 / an App Password (not your
# regular password).  For other providers, use the SMTP host and
# credentials they supply.  See docs/guides/email_setup.md for details.
# ─────────────────────────────────────────────────────────────────────
email:
  smtp_server: smtp.gmail.com
  smtp_port: 587
  use_tls: true
  username: your-assistant-email@gmail.com
  password: your-app-password-here
  from_address: your-assistant-email@gmail.com
  to_address: your.work@email.com

alpaca:
  api_key: YOUR_PAPER_API_KEY
  api_secret: YOUR_PAPER_API_SECRET
  base_url: https://paper-api.alpaca.markets

risk:
  starting_capital: 1000
  planned_risk_pct_min: 0.005
  planned_risk_pct_max: 0.01
  max_open_positions: 2

shadow_trading:
  enabled: false  # Set to true to enable paper trading
  max_positions: 10
  default_order_type: market
  timeout_days: 15  # Auto-close after this many days

automation:
  morning_watchlist_hour_et: 8
  eod_recap_hour_et: 16
