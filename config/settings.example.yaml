app:
  environment: local
  timezone: America/New_York

# ── Email / SMTP configuration ──────────────────────────────────────
# Fill these in inside config/settings.local.yaml (never commit that file).
# For Gmail: use smtp.gmail.com / port 587 / an App Password (not your
# regular password).  For other providers, use the SMTP host and
# credentials they supply.  See docs/guides/email_setup.md for details.
# ─────────────────────────────────────────────────────────────────────
email:
  smtp_server: smtp.gmail.com
  smtp_port: 587
  use_tls: true
  username: your-assistant-email@gmail.com
  password: your-app-password-here
  from_address: your-assistant-email@gmail.com
  to_address: your.work@email.com
  cc_addresses:                                # Optional: CC additional emails
    - your.personal@email.com

alpaca:
  api_key: YOUR_PAPER_API_KEY
  api_secret: YOUR_PAPER_API_SECRET
  base_url: https://paper-api.alpaca.markets

risk:
  starting_capital: 100000    # Should match your paper/live trading account
  planned_risk_pct_min: 0.005
  planned_risk_pct_max: 0.01
  max_open_positions: 10

shadow_trading:
  enabled: false  # Set to true to enable paper trading
  max_positions: 10
  default_order_type: market
  timeout_days: 15  # Auto-close after this many days

automation:
  morning_watchlist_hour_et: 8
  eod_recap_hour_et: 16
  scan_interval_minutes: 30
  market_open_hour_et: 9
  market_open_minute_et: 30
  market_close_hour_et: 16

llm:
  enabled: true
  model: "qwen3:8b"
  base_url: "http://localhost:11434"
  temperature: 0.7
  max_tokens: 1500
  timeout_seconds: 180

training:
  enabled: true
  anthropic_api_key: "your-anthropic-api-key-here"
  claude_model: "claude-haiku-4-5-20251001"
  auto_train_threshold: 50       # Fine-tune when N new examples accumulate
  auto_train_time_days: 7        # Or fine-tune if N days since last train
  auto_train_min_examples: 20    # Min new examples for time-based trigger
  auto_rollback_expectancy_drop: 0.20   # Rollback if expectancy drops >20%
  auto_rollback_winrate_drop: 0.10      # Rollback if win rate drops >10%

data_enrichment:
  enabled: true
  finnhub_api_key: "your-finnhub-api-key"   # Free at finnhub.io
  fred_api_key: "your-fred-api-key"         # Free at fred.stlouisfed.org
  cache_hours: 24                            # Cache fundamental/macro data
  insider_lookback_days: 90
  include_news_in_backfill: true         # Include Finnhub news in historical backfill

risk_governor:
  enabled: true
  max_daily_loss_pct: 0.03       # Halt all trading if portfolio drops 3% in a day
  max_position_pct: 0.10          # No single position > 10% of equity
  max_open_positions: 10          # Maximum simultaneous positions
  max_sector_pct: 0.30            # No sector > 30% of portfolio
  max_correlated: 3               # Max positions in same sector
  vol_halt_pct: 35.0              # Halt new longs if VIX proxy > 35%

bootcamp:
  enabled: false
  phase: 1                          # 1 = data collection, 2 = optimization, 3 = ML/LLM learning
  # Override thresholds for high-volume data collection
  qualification_threshold: 40       # Normal: 70 — lowered to capture more trades
  watchlist_threshold: 25           # Normal: 45 — lowered for broader watchlist
  # Override position limits
  max_positions: 50                 # No practical limit during bootcamp
  # Email preferences
  email_mode: full_stream           # full_stream / daily_summary / silent
  max_packets_per_scan: 8           # Cap packets per scan to fit in 30-min window
  scan_interval_minutes: 30         # How often to re-scan during market hours

# ── Telegram Notifications ───────────────────────────────────────
# Real-time push alerts for trade opens/closes, earnings warnings,
# overnight collection results, and system events.
# Setup: message @BotFather on Telegram → /newbot → copy token
#        message your bot → /start → get chat_id from
#        https://api.telegram.org/bot<TOKEN>/getUpdates
# ─────────────────────────────────────────────────────────────────
telegram:
  enabled: false
  bot_token: "your-bot-token-from-botfather"
  chat_id: "your-chat-id"
