# Render Blueprint — Halcyon Lab Cloud Deployment
# https://render.com/docs/blueprint-spec

services:
  # ── Static site: React frontend ────────────────────────────────────
  - type: web
    name: halcyon-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://halcyon-api.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── Python web service: read-only API ──────────────────────────────
  - type: web
    name: halcyon-api
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements-cloud.txt
    startCommand: uvicorn src.api.cloud_app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: # Set manually in Render dashboard (Internal Database URL)
      - key: API_SECRET
        sync: false # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.6"
    healthCheckPath: /healthz
